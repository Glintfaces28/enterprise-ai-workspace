services:
  - type: web
    name: ogelytics-ai-workspace-backend
    runtime: python
    rootDir: enterprise-ai-workspace/backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ogelytics-ai-workspace-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        sync: false

databases:
  - name: ogelytics-ai-workspace-db
    databaseName: ogelytics_ai_workspace
    user: ogelytics
